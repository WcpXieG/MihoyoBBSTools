name: Deploy Project

on:
  push:
    branches:
      - main  # 监听 push 到 main 分支的事件
  pull_request:
    branches:
      - main  # 监听针对 main 的 PR
  schedule:
    - cron: '30 9 * * *'  # 每天 09:30 UTC 时间
  workflow_dispatch:  # 手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码库
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.9'  # 指定 Python 版本

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 启动主程序
      - name: Start the main thread
        run: |
          python main.py

      # 5. 推送消息到 API
      - name: Send notification to API
        run: |
          TITLE="Deploy Success"
          CONTENT="部署成功！\n所有任务已经完成。"

          # 使用 urlencode 对中文进行编码（您可以根据需要修改）
          TITLE_ENCODED=$(echo "$TITLE" | jq -sRr @uri)
          CONTENT_ENCODED=$(echo "$CONTENT" | jq -sRr @uri)

          # 发送 POST 请求
          curl -X POST "https://sctapi.ftqq.com/SCT264292TWz5ByXYE4AERSztrg1yy2S50.send?title=${TITLE_ENCODED}&desp=${CONTENT_ENCODED}"
